name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Non-blocking checks
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Run core checks
        run: ./Scripts/test.sh

  build:
    name: Build app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Package app
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./Scripts/package-release.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoInputSwitcher-macOS
          path: |
            .build/dist/AutoInputSwitcher-macOS.dmg
            .build/dist/AutoInputSwitcher-macOS.zip
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoInputSwitcher-macOS
          path: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: build-${{ github.run_number }}
          TITLE: AutoInputSwitcher build ${{ github.run_number }}
        run: |
          ZIP_PATH="$(find release-assets -type f -name 'AutoInputSwitcher-macOS.zip' | head -n 1)"
          DMG_PATH="$(find release-assets -type f -name 'AutoInputSwitcher-macOS.dmg' | head -n 1)"
          if [ -z "$DMG_PATH" ] || [ -z "$ZIP_PATH" ]; then
            echo "Release assets were not downloaded" >&2
            exit 1
          fi

          gh release delete "$TAG_NAME" --repo "$GH_REPO" --cleanup-tag --yes || true

          gh release create "$TAG_NAME" "$DMG_PATH" "$ZIP_PATH" \
            --repo "$GH_REPO" \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --notes "Automated macOS build from $GITHUB_SHA. Download AutoInputSwitcher-macOS.dmg for the app image, or AutoInputSwitcher-macOS.zip as a plain archive. The checks job is non-blocking; build and release depend only on the package step." \
            --latest
